<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>VIP Exclusive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph (biar jadi preview keren di WhatsApp) -->
  <meta property="og:title" content="MAUSLOT VIP">
  <meta property="og:description" content="Tempat eksklusif untuk para member pilihan">
  <meta property="og:image" content="https://domainkamu.com/banner.jpg">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
      max-width: 400px;
      margin: auto;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: gold;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 30px;
    }

    .card {
      background: linear-gradient(145deg, #111, #1f1f1f);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(255,215,0,0.1);
    }

    .btn {
      display: block;
      margin: 15px 0;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .wa {
      background: linear-gradient(90deg, gold, #ffcc00);
      color: #000;
    }

    .telegram {
      background: #222;
      border: 1px solid gold;
      color: gold;
    }

    .web {
      background: #111;
      border: 1px solid #444;
      color: #fff;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }

  </style>
</head>
<body>

  <div class="container">
    
    <div class="logo">MAUSLOT VIP</div>

    <div class="title">SELAMAT DATANG</div>
    <div class="subtitle">Tempat eksklusif untuk para member pilihan</div>

    <div class="card">

      <a class="btn wa" href="https://wa.me/628xxxx">
        💬 Chat WhatsApp
      </a>

      <a class="btn telegram" href="https://t.me/username">
        🚀 Join Telegram
      </a>

      <a class="btn web" href="https://domainkamu.com">
        🌐 Masuk Website
      </a>

    </div>

    <div class="footer">
      © 2026 VIP Exclusive
    </div>

  </div>

</body>
</html>
